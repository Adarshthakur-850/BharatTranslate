apiVersion: apps/v1
kind: Deployment
metadata:
  name: bharat-translate-backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-dockerhub-user/bharat-translate-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEVICE
          value: "cpu"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: backend
